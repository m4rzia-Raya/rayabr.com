<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Módulo em desenvolvimento · Raya Advisory</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--petrol:#134E58;--teal:#1D9492;--copper:#BE620F;--bg:#FAF8F2;--card:#FFF;--text:#122028;--text3:#6B7B7E;--border:rgba(18,32,40,.12);}
*{margin:0;box-sizing:border-box;} body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.top{background:var(--petrol);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;}
.top a{color:#fff;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:.06em;border:1px solid rgba(255,255,255,.3);padding:8px 14px;border-radius:6px;}
.top a:hover{background:rgba(255,255,255,.12);}
.brand{font-family:'Cormorant Garamond',serif;color:#fff;font-size:24px;letter-spacing:4px;}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
.badge{display:inline-block;background:rgba(190,98,15,.12);color:var(--copper);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:6px 16px;border-radius:999px;margin-bottom:20px;}
h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:500;margin-bottom:14px;}
p{color:var(--text3);max-width:520px;line-height:1.7;}
.home{margin-top:28px;background:var(--teal);color:#fff;text-decoration:none;padding:12px 24px;border-radius:8px;font-weight:600;font-size:14px;}
</style></head>
<body>
<div class="top"><span class="brand">RAYA</span><a href="index.html">← Voltar ao portal</a></div>
<div class="wrap">
  <span class="badge">Em desenvolvimento</span>
  <h1>Módulo em construção</h1>
  <p>Esta análise faz parte do projeto Viabilidade de Perfis e está sendo desenvolvida e validada. Em breve estará disponível aqui no portal.</p>
  <a class="home" href="index.html">Voltar ao portal</a>
</div>
</body></html>
